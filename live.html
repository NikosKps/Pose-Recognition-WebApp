<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Tracking | Pose AI</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23000' stroke-width='2'><circle cx='12' cy='5' r='2'/><path d='M12 7v7M9 21l3-7 3 7M7 11l-2 3M17 11l2 3'/></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar animate-in">
        <div class="nav-container">
            <a href="home.html" class="nav-brand-box" style="text-decoration:none;display:flex;align-items:center;gap:8px;"><svg style="width:18px;height:18px;fill:none;stroke:var(--brand-color);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;" viewBox="0 0 24 24"><circle cx="12" cy="5" r="2"/><path d="M12 7v7M9 21l3-7 3 7M7 11l-2 3M17 11l2 3"/></svg><span class="brand-text">Pose AI</span></a>
            <ul class="nav-links">
                <li><a href="home.html" class="nav-item">Home</a></li>
                <li><a href="about.html" class="nav-item">About</a></li>
            </ul>
            <a href="index.html" class="nav-cta-btn">
                <svg class="icon-control" viewBox="0 0 24 24"><path d="M6 12h4m-2-2v4m5-2h.01M17 12h.01M17 10h.01M17 14h.01M12 21a9 9 0 1 1 0-18 9 9 0 0 1 0 18Z" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <span>App Demo</span>
            </a>
            <button class="hamburger-btn" id="hamburger" onclick="toggleMenu()" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <div class="mobile-menu" id="mobile-menu">
        <a href="home.html">Home</a>
        <a href="about.html">About</a>
        <div class="mobile-divider"></div>
        <a href="index.html" class="mobile-cta">
            <svg style="width:16px;height:16px;fill:none;stroke:#fff;stroke-width:2.5" viewBox="0 0 24 24"><path d="M6 12h4m-2-2v4m5-2h.01M17 12h.01M17 10h.01M17 14h.01M12 21a9 9 0 1 1 0-18 9 9 0 0 1 0 18Z" stroke-linecap="round" stroke-linejoin="round"/></svg>
            App Demo
        </a>
    </div>

    <div class="app-content animate-in">
        <h2 style="font-size: 2.5rem; letter-spacing: -1.5px; margin-bottom: 30px; font-weight: 800; align-self: center; color: var(--text-primary);">Live Tracking</h2>

        <div class="btn-group">
            <button type="button" class="btn-main" id="start-btn" onclick="startCamera()">Start Camera</button>
            <button type="button" class="btn-secondary" id="stop-btn" onclick="stopCamera()">Stop</button>
            <button type="button" class="btn-secondary" id="flip-btn" onclick="flipCamera()" style="display:none; padding: 18px 20px;">
                <svg style="width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;" viewBox="0 0 24 24"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
            </button>
        </div>

        <div id="canvas-container"><canvas id="canvas"></canvas></div>

        <div style="width: 100%; display: flex; justify-content: center;">
            <div id="label-container" class="status-neutral">Ready...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
    <script>
        const MODEL_URL = "https://teachablemachine.withgoogle.com/models/n6DATMK2O/";
        let model, webcam, ctx, labelContainer, rafId, isRunning = false;
        let facingMode = "user";

        async function startCamera() {
            const startBtn = document.getElementById("start-btn");
            const stopBtn  = document.getElementById("stop-btn");
            const flipBtn  = document.getElementById("flip-btn");
            labelContainer = document.getElementById("label-container");

            startBtn.disabled = true;
            startBtn.textContent = "Loading...";
            labelContainer.innerHTML = "Loading model...";
            labelContainer.className = "status-loading";

            try {
                if (!model) model = await tmPose.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");

                const size = Math.min(window.innerWidth - 40, 450);
                webcam = new tmPose.Webcam(size, size, facingMode === "user");
                await webcam.setup({ facingMode });
                await webcam.play();

                const canvas = document.getElementById("canvas");
                canvas.width = size;
                canvas.height = size;
                ctx = canvas.getContext("2d");

                isRunning = true;
                startBtn.style.display = "none";
                stopBtn.style.display = "inline-flex";
                flipBtn.style.display = "inline-flex";

                labelContainer.innerHTML = "Detecting...";
                labelContainer.className = "status-neutral";

                rafId = window.requestAnimationFrame(loop);

            } catch (err) {
                const msg = err.name === "NotAllowedError"
                    ? "⚠️ Camera access denied"
                    : "⚠️ Could not start camera";
                labelContainer.innerHTML = msg;
                labelContainer.className = "status-neutral";
                startBtn.disabled = false;
                startBtn.textContent = "Start Camera";
            }
        }

        async function flipCamera() {
            facingMode = facingMode === "user" ? "environment" : "user";
            isRunning = false;
            cancelAnimationFrame(rafId);
            if (webcam) { webcam.stop(); }
            await startCamera();
        }

        function stopCamera() {
            isRunning = false;
            cancelAnimationFrame(rafId);
            if (webcam) { webcam.stop(); }

            const canvas = document.getElementById("canvas");
            if (ctx) ctx.clearRect(0, 0, canvas.width, canvas.height);

            document.getElementById("stop-btn").style.display = "none";
            document.getElementById("flip-btn").style.display = "none";
            const startBtn = document.getElementById("start-btn");
            startBtn.style.display = "inline-flex";
            startBtn.disabled = false;
            startBtn.textContent = "Start Camera";

            document.getElementById("label-container").innerHTML = "Stopped.";
            document.getElementById("label-container").className = "status-neutral";
        }

        async function loop() {
            if (!isRunning) return;
            webcam.update();
            await predict();
            rafId = window.requestAnimationFrame(loop);
        }

        async function predict() {
            const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
            const prediction = await model.predict(posenetOutput);

            let high = 0, match = "";
            prediction.forEach(p => { if (p.probability > high) { high = p.probability; match = p.className; } });

            const humanDetected = pose && pose.score > 0.45;
            labelContainer.innerHTML = humanDetected ? match.toUpperCase() : "⚠️ NO HUMAN";
            labelContainer.className = humanDetected ? "status-main" : "status-neutral";

            ctx.drawImage(webcam.canvas, 0, 0);
            if (pose) {
                const minConf = 0.5;
                tmPose.drawKeypoints(pose.keypoints, minConf, ctx);
                tmPose.drawSkeleton(pose.keypoints, minConf, ctx);
            }
        }
    </script>
    <script>
        function toggleMenu() {
            const btn = document.getElementById('hamburger');
            const menu = document.getElementById('mobile-menu');
            btn.classList.toggle('open');
            menu.classList.toggle('open');
        }
        document.addEventListener('click', function(e) {
            const btn = document.getElementById('hamburger');
            const menu = document.getElementById('mobile-menu');
            if (!btn.contains(e.target) && !menu.contains(e.target)) {
                btn.classList.remove('open');
                menu.classList.remove('open');
            }
        });
    </script>
</body>
</html>
