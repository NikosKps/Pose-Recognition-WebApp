    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar animate-in">
        <div class="nav-container">
            <a href="home.html" class="nav-brand-box" style="text-decoration:none;display:flex;align-items:center;gap:8px;"><svg style="width:18px;height:18px;fill:none;stroke:var(--brand-color);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;" viewBox="0 0 24 24"><circle cx="12" cy="5" r="2"/><path d="M12 7v7M9 21l3-7 3 7M7 11l-2 3M17 11l2 3"/></svg><span class="brand-text">Pose AI</span></a>
            <ul class="nav-links">
                <li><a href="home.html" class="nav-item">Home</a></li>
                <li><a href="about.html" class="nav-item">About</a></li>
            </ul>
            <a href="index.html" class="nav-cta-btn">
                <svg class="icon-control" viewBox="0 0 24 24"><path d="M6 12h4m-2-2v4m5-2h.01M17 12h.01M17 10h.01M17 14h.01M12 21a9 9 0 1 1 0-18 9 9 0 0 1 0 18Z" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <span>App Demo</span>
            </a>
            <button class="hamburger-btn" id="hamburger" onclick="toggleMenu()" aria-label="Menu">
                <span></span><span></span><span></span>

    <div class="mobile-menu" id="mobile-menu">
        <a href="home.html">Home</a>
        <a href="about.html">About</a>
        <div class="mobile-divider"></div>
        <a href="index.html" class="mobile-cta">
            <svg style="width:16px;height:16px;fill:none;stroke:#fff;stroke-width:2.5" viewBox="0 0 24 24"><path d="M6 12h4m-2-2v4m5-2h.01M17 12h.01M17 10h.01M17 14h.01M12 21a9 9 0 1 1 0-18 9 9 0 0 1 0 18Z" stroke-linecap="round" stroke-linejoin="round"/></svg>
            App Demo
        </a>
    </div>

    <div class="app-content animate-in">
        <h2 style="font-size: 2.5rem; letter-spacing: -1.5px; margin-bottom: 30px; font-weight: 800; align-self: center; color: var(--text-primary);">15s Accuracy Test</h2>

        <div class="btn-group">
            <button type="button" class="btn-main" id="test-btn" onclick="startTest()">Start 15s Test</button>
            <button type="button" class="btn-secondary" id="retry-btn" onclick="resetTest()">Try Again</button>
        </div>

        <div id="canvas-container"><canvas id="canvas"></canvas></div>

        <div style="width: 100%; display: flex; justify-content: center;">
            <div id="label-container" class="status-neutral">Ready...</div>
        </div>

        <div id="movement-log" style="display:none; width:100%; max-width:450px; margin: 16px auto 40px;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
    <script>
        const MODEL_URL = "https://teachablemachine.withgoogle.com/models/n6DATMK2O/";
        let model, webcam, ctx, labelContainer;
        let scores = [], isTesting = false, rafId;

        // Debounce: μια pose πρέπει να εντοπιστεί για CONFIRM_FRAMES
        // συνεχόμενα frames πριν καταγραφεί ως κίνηση
        const CONFIRM_FRAMES = 12;
        let candidatePose = null;
        let candidateFrames = 0;
        let confirmedPose = null;
        let movementSequence = [];

        async function startTest() {
            const testBtn = document.getElementById("test-btn");
            labelContainer = document.getElementById("label-container");

            testBtn.disabled = true;
            testBtn.textContent = "Loading...";
            labelContainer.innerHTML = "Loading model...";
            labelContainer.className = "status-loading";

            try {
                model = await tmPose.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");

                const size = Math.min(window.innerWidth - 40, 450);
                webcam = new tmPose.Webcam(size, size, true);
                await webcam.setup();
                await webcam.play();

                const canvas = document.getElementById("canvas");
                canvas.width = size;
                canvas.height = size;
                ctx = canvas.getContext("2d");

                testBtn.style.display = "none";
                scores = [];
                movementSequence = [];
                candidatePose = null;
                candidateFrames = 0;
                confirmedPose = null;
                isTesting = true;

                document.getElementById("movement-log").style.display = "none";

                let timeLeft = 15;
                labelContainer.innerHTML = `TESTING: ${timeLeft}s`;
                labelContainer.className = "status-main";

                const timer = setInterval(() => {
                    timeLeft--;
                    if (timeLeft <= 0) {
                        clearInterval(timer);
                        isTesting = false;
                        finish();
                    } else {
                        labelContainer.innerHTML = `TESTING: ${timeLeft}s`;
                    }
                }, 1000);

                rafId = requestAnimationFrame(loop);

            } catch (err) {
                const msg = err.name === "NotAllowedError"
                    ? "⚠️ Camera access denied"
                    : "⚠️ Could not start camera";
                labelContainer.innerHTML = msg;
                labelContainer.className = "status-neutral";
                testBtn.disabled = false;
                testBtn.textContent = "Start 10s Test";
            }
        }

        async function loop() {
            if (!webcam) return;
            webcam.update();

            const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
            const prediction = await model.predict(posenetOutput);

            if (isTesting && pose && pose.score > 0.45) {
                let best = prediction.reduce((p, c) => p.probability > c.probability ? p : c);
                scores.push({ name: best.className, prob: best.probability });

                // Debounce logic:
                // Αν η ίδια pose συνεχίζεται → αύξηση counter
                // Αν φτάσει CONFIRM_FRAMES και είναι διαφορετική από την τελευταία → καταγραφή
                if (best.className === candidatePose) {
                    candidateFrames++;
                    if (candidateFrames === CONFIRM_FRAMES && best.className !== confirmedPose) {
                        confirmedPose = best.className;
                        movementSequence.push(best.className);
                    }
                } else {
                    // Νέα candidate pose, επαναφορά counter
                    candidatePose = best.className;
                    candidateFrames = 1;
                }
            }

            ctx.drawImage(webcam.canvas, 0, 0);
            if (pose) {
                tmPose.drawKeypoints(pose.keypoints, 0.5, ctx);
                tmPose.drawSkeleton(pose.keypoints, 0.5, ctx);
            }

            if (isTesting) rafId = requestAnimationFrame(loop);
        }

        function finish() {
            cancelAnimationFrame(rafId);
            if (webcam) { webcam.stop(); }

            document.getElementById("retry-btn").style.display = "inline-flex";

            if (scores.length === 0) {
                labelContainer.innerHTML = "⚠️ No human detected";
                labelContainer.className = "status-neutral";
                return;
            }

            // Dominant pose + accuracy
            const counts = {};
            scores.forEach(s => counts[s.name] = (counts[s.name] || 0) + 1);
            const dom = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
            const domScores = scores.filter(s => s.name === dom);
            const avg = domScores.reduce((sum, s) => sum + s.prob, 0) / domScores.length;

            labelContainer.innerHTML = `${dom.toUpperCase()} — ${(avg * 100).toFixed(1)}%`;
            labelContainer.className = "status-main";

            // Movement sequence log
            const log = document.getElementById("movement-log");
            log.style.display = "block";

            if (movementSequence.length > 0) {
                log.innerHTML = `
                    <div style="font-size:13px; font-weight:600; text-transform:uppercase; color:var(--text-muted); margin-bottom:14px; letter-spacing:0.05em;">Movement sequence</div>
                    <div style="display:flex; flex-direction:column; gap:8px;">
                        ${movementSequence.map((pose, i) => `
                            <div style="display:flex; align-items:center; gap:14px; padding:14px 18px; background:var(--card-bg); border:1px solid var(--border-card); border-radius:16px;">
                                <span style="font-size:12px; font-weight:700; color:var(--text-muted); min-width:20px;">${i + 1}</span>
                                <span style="font-size:15px; font-weight:600; color:var(--text-primary);">${pose}</span>
                            </div>
                        `).join("")}
                    </div>`;
            } else {
                log.innerHTML = `<div style="font-size:14px; color:var(--text-muted); text-align:center; padding: 12px 0;">No distinct movements detected.</div>`;
            }
        }

        function resetTest() {
            scores = [];
            movementSequence = [];
            candidatePose = null;
            candidateFrames = 0;
            confirmedPose = null;
            isTesting = false;
            webcam = null;
            ctx = null;

            const canvas = document.getElementById("canvas");
            canvas.getContext("2d").clearRect(0, 0, canvas.width, canvas.height);

            document.getElementById("retry-btn").style.display = "none";
            document.getElementById("movement-log").style.display = "none";

            const testBtn = document.getElementById("test-btn");
            testBtn.style.display = "inline-flex";
            testBtn.disabled = false;
            testBtn.textContent = "Start 15s Test";

            labelContainer.innerHTML = "Ready...";
            labelContainer.className = "status-neutral";
        }
    </script>
    <script>
        function toggleMenu() {
            const btn = document.getElementById('hamburger');
            const menu = document.getElementById('mobile-menu');
            btn.classList.toggle('open');
            menu.classList.toggle('open');
        }
        document.addEventListener('click', function(e) {
            const btn = document.getElementById('hamburger');
            const menu = document.getElementById('mobile-menu');
            if (!btn.contains(e.target) && !menu.contains(e.target)) {
                btn.classList.remove('open');
                menu.classList.remove('open');
            }
        });
    </script>
</body>
</html>
